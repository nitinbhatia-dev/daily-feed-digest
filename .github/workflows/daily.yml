name: Daily Feed Digest

on:
  schedule:
    - cron: "0 4 * * *"   # 9:30 AM IST (04:00 UTC)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Run digest
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_BEARER_TOKEN:    ${{ secrets.TWITTER_BEARER_TOKEN }}
          GITHUB_TOKEN:            ${{ secrets.GH_PAT }}
          SLACK_BOT_TOKEN:         ${{ secrets.SLACK_BOT_TOKEN }}
          REDDIT_CLIENT_ID:        ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:    ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:         ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:         ${{ secrets.REDDIT_PASSWORD }}
          TWITTER_QUERY:           ${{ vars.TWITTER_QUERY }}
          GITHUB_REPOS:            ${{ vars.GITHUB_REPOS }}
          SLACK_CHANNEL_IDS:       ${{ vars.SLACK_CHANNEL_IDS }}
          REDDIT_SUBREDDITS:       ${{ vars.REDDIT_SUBREDDITS }}
          OUTPUT_FILE:             digest.md
        run: python -m src.main

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest-${{ github.run_number }}
          path: digest.md
          retention-days: 30
